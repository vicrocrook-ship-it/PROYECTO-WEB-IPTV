<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VICRO SYSTEM - IPTV Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; display: flex; background: #0b0b0e; color: #f3f4f6; height: 100vh; overflow: hidden; }
        
        /* Barra lateral izquierda */
        #sidebar { width: 360px; background: #121216; display: flex; flex-direction: column; border-right: 1px solid #1f1f2e; transition: all 0.3s ease; }
        
        .brand { padding: 20px; text-align: center; border-bottom: 1px solid #1f1f2e; background: #161622; }
        .brand h2 { font-size: 18px; letter-spacing: 2px; color: #00a2ff; text-transform: uppercase; font-weight: 800; }
        
        .login-box { padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #161622; border-bottom: 1px solid #1f1f2e; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 11px; color: #8f94a5; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input { background: #1e1e2f; border: 1px solid #2d2d44; padding: 10px 14px; color: #fff; border-radius: 6px; font-size: 14px; transition: all 0.2s; width: 100%; }
        input:focus { outline: none; border-color: #00a2ff; box-shadow: 0 0 8px rgba(0, 162, 255, 0.2); }
        
        button { background: linear-gradient(135deg, #0078d4, #00a2ff); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: all 0.2s; margin-top: 5px; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        
        .search-box { padding: 15px; background: #121216; }
        
        /* Lista de canales con scroll fluido */
        #playlist { flex: 1; overflow-y: auto; list-style: none; padding: 10px; }
        #playlist::-webkit-scrollbar { width: 6px; }
        #playlist::-webkit-scrollbar-thumb { background: #2d2d44; border-radius: 3px; }
        
        #playlist li { padding: 14px 18px; cursor: pointer; border-radius: 6px; margin-bottom: 4px; font-size: 14px; transition: all 0.2s ease; display: flex; align-items: center; background: #161622; border: 1px solid transparent; }
        #playlist li:hover { background: #1e1e2f; border-color: #2d2d44; padding-left: 22px; }
        #playlist li.active { background: linear-gradient(90deg, #005a9e, #0078d4); font-weight: bold; border-color: #00a2ff; }
        
        /* Mensajes de estado y animación de carga */
        .status-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; color: #8f94a5; gap: 15px; }
        .spinner { width: 30px; height: 30px; border: 3px solid #2d2d44; border-top: 3px solid #00a2ff; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Contenedor derecho del Video */
        #video-container { flex: 1; display: flex; justify-content: center; align-items: center; background: #050507; position: relative; }
        video { width: 100%; height: 100%; max-height: 100vh; object-fit: contain; box-shadow: inset 0 0 100px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="brand">
            <h2>VICRO SYSTEM</h2>
        </div>
        
        <div class="login-box">
            <div class="form-group">
                <label>Dirección del Servidor</label>
                <input type="text" id="xc-server" placeholder="http://200.24.146.99:27904">
            </div>
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="xc-user" placeholder="Ingresa tu usuario">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="xc-pass" placeholder="Ingresa tu contraseña">
            </div>
            <button id="btn-conectar">Conectar Cuenta</button>
        </div>
        
        <div class="search-box">
            <input type="text" id="search" placeholder="🔍 Filtrar canales en vivo...">
        </div>
        
        <ul id="playlist">
            <div class="status-container">
                <div class="spinner" id="loading-spinner"></div>
                <div id="status-text">Introduce tus credenciales para sincronizar canales en vivo.</div>
            </div>
        </ul>
    </div>

    <div id="video-container">
        <video id="video" controls autoplay></video>
    </div>

    <script src="app.js"></script>
</body>
</html>
